<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 700px;
            height: 80vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #2d6a4f;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h2 { font-size: 1.3rem; }
        .chat-header p { font-size: 0.85rem; opacity: 0.8; margin-top: 4px; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.92rem;
            line-height: 1.5;
        }

        .user-message {
            background: #2d6a4f;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background: #f1f5f9;
            color: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .typing {
            background: #f1f5f9;
            color: #94a3b8;
            align-self: flex-start;
            padding: 12px 16px;
            border-radius: 12px;
            font-style: italic;
            font-size: 0.88rem;
        }

        .chat-input {
            display: flex;
            padding: 16px;
            border-top: 1px solid #e2e8f0;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.92rem;
            outline: none;
            transition: border 0.2s;
        }

        .chat-input input:focus { border-color: #2d6a4f; }

        .chat-input button {
            padding: 12px 24px;
            background: #2d6a4f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.92rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-input button:hover { background: #1b4332; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>🏥 Medical Chatbot</h2>
            <p>Powered by Llama 3 + Gale Encyclopedia of Medicine</p>
        </div>

        <div class="chat-messages" id="messages">
            <div class="message bot-message">
                Hello! I'm your medical assistant. Ask me anything about symptoms, conditions, or treatments.
            </div>
        </div>

        <div class="chat-input">
            <input 
                type="text" 
                id="userInput" 
                placeholder="Ask a medical question..." 
                onkeypress="if(event.key==='Enter') sendMessage()"
            />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById("userInput");
            const messages = document.getElementById("messages");
            const userText = input.value.trim();

            if (!userText) return;

            // Add user message
            messages.innerHTML += `
                <div class="message user-message">${userText}</div>
            `;
            input.value = "";

            // Add typing indicator
            messages.innerHTML += `
                <div class="typing" id="typing">Bot is thinking...</div>
            `;
            messages.scrollTop = messages.scrollHeight;

            // Send to Flask
            fetch("/get", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `msg=${encodeURIComponent(userText)}`
            })
            .then(res => res.text())
            .then(answer => {
                document.getElementById("typing").remove();
                messages.innerHTML += `
                    <div class="message bot-message">${answer}</div>
                `;
                messages.scrollTop = messages.scrollHeight;
            });
        }
    </script>
</body>
</html>
